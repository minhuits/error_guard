name: error_guard_example
description: Demonstrates how to use the error_guard package.
publish_to: 'none' # 예제 프로젝트 자체는 배포하지 않음

environment:
  sdk: ^3.0.0

dependencies:
  error_guard:
    path: ../ # 상위 폴더(내 패키지)를 참조하도록 설정
  # 필요한 경우 다른 패키지 추가 (예: fpdart)
  fpdart: ^1.2.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0